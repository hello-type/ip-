<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is my IP address? — Terminal Edition</title>
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(10, 15, 30, 0.8);
            --accent-glow: #00ff66;
            --accent-dim: rgba(0, 255, 102, 0.25);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --terminal-green: #00ff66;
            --terminal-blue: #00f0ff;
        }

        /* High-Tech Static Coder Wallpaper Background */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, #101b30 0%, #060913 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        /* Ambient Background Code Elements */
        body::before {
            content: "import sys, socket, requests;\nwhile(True):\n  try:\n    packets = listen(port=8080);\n    decrypt_payload(packets);\n  except ConnectionResetError:\n    retry_handshake();";
            position: absolute;
            top: 5%;
            left: 5%;
            font-size: 13px;
            color: rgba(0, 255, 102, 0.04);
            white-space: pre;
            pointer-events: none;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-heading {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--terminal-blue);
            margin-bottom: 20px;
            text-align: left;
            padding-left: 5px;
        }

        /* Isolated Glowing IP Box with Dynamic Hover */
        .ip-box-wrapper {
            background: rgba(13, 22, 43, 0.85);
            border: 1px solid var(--accent-dim);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-bottom: 30px;
        }

        /* High tech hover for the standalone IP box */
        .ip-box-wrapper:hover {
            transform: translateY(-5px);
            border-color: var(--accent-glow);
            box-shadow: 0 15px 40px rgba(0, 255, 102, 0.12);
            background: rgba(16, 28, 54, 0.9);
        }

        .ip-address-text {
            font-size: 34px;
            font-weight: bold;
            color: var(--text-main);
            word-break: break-all;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            padding-right: 15px;
        }

        /* Aesthetic Coder Copy Button */
        .copy-btn {
            background: rgba(0, 240, 255, 0.05);
            color: var(--terminal-blue);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--terminal-green);
            color: var(--bg-color);
            border-color: var(--terminal-green);
            box-shadow: 0 0 15px var(--terminal-green);
            transform: scale(1.05);
        }

        /* Metadata & Utilities (Kept cleanly outside the box) */
        .meta-section {
            padding: 0 5px;
        }

        .geo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--terminal-green);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 35px;
        }

        .grid-node {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px;
            border-radius: 8px;
            transition: all 0.25s ease;
        }

        .grid-node:hover {
            background: rgba(0, 240, 255, 0.02);
            border-color: rgba(0, 240, 255, 0.25);
            transform: scale(1.02);
        }

        .grid-node span {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .grid-node strong {
            font-size: 13px;
            color: var(--text-main);
        }

        .utility-terminal {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .utility-terminal:hover {
            border-color: rgba(0, 240, 255, 0.3);
        }

        .utility-terminal h3 {
            margin: 0 0 15px 0;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .query-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #090e1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 12px;
            color: var(--terminal-blue);
            font-family: inherit;
            outline: none;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: var(--terminal-blue);
        }

        .run-btn {
            background: transparent;
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 0 22px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }

        .run-btn:hover {
            background: var(--terminal-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--terminal-green);
        }

        .console-output {
            margin-top: 15px;
            padding: 12px;
            background: #090e1a;
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid var(--terminal-blue);
            display: none;
            color: #e2e8f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-heading">// What is my IP address</div>

        <!-- ONLY IP Address is housed inside this dedicated interactive element -->
        <div class="ip-box-wrapper">
            <div class="ip-address-text" id="userIp">Loading...</div>
            <button class="copy-btn" id="copyBtn" onclick="copyIpToClipboard()">COPY</button>
        </div>

        <!-- All secondary details sit cleanly outside the main container box -->
        <div class="meta-section">
            <div class="geo-badge" id="userLocation">Locating Node...</div>

            <div class="details-grid">
                <div class="grid-node">
                    <span>[Network ISP]</span>
                    <strong id="nodeIsp">-</strong>
                </div>
                <div class="grid-node">
                    <span>[Sub-Region]</span>
                    <strong id="nodeRegion">-</strong>
                </div>
                <div class="grid-node">
                    <span>[GPS Coords]</span>
                    <strong id="nodeCoords">-</strong>
                </div>
                <div class="grid-node">
                    <span>[ISO Country]</span>
                    <strong id="nodeCountry">-</strong>
                </div>
            </div>

            <!-- Custom Remote Tracing System -->
            <div class="utility-terminal">
                <h3>// Execute Remote Target Trace</h3>
                <div class="query-row">
                    <input type="text" id="traceInput" placeholder="Enter remote IP or location string...">
                    <button class="run-btn" onclick="runConsoleTrace()">RUN</button>
                </div>
                <div id="consoleLog" class="console-output"></div>
            </div>
        </div>
    </div>

    <script>
        // Automatic system profiling discovery hook
        async function runAutoNodeProfiling() {
            try {
                const response = await fetch('http://ip-api.com/json/');
                const data = await response.json();

                if(data.status === "success") {
                    document.getElementById('userIp').innerText = data.query;
                    document.getElementById('userLocation').innerText = `● Connected via ${data.city}, ${data.country}`;
                    document.getElementById('nodeIsp').innerText = data.isp;
                    document.getElementById('nodeRegion').innerText = data.regionName;
                    document.getElementById('nodeCoords').innerText = `${data.lat}, ${data.lon}`;
                    document.getElementById('nodeCountry').innerText = data.countryCode;
                } else {
                    document.getElementById('userIp').innerText = "TRACE_FAILED";
                }
            } catch (err) {
                document.getElementById('userIp').innerText = "DISCONNECTED";
                console.error(err);
            }
        }

        // Functional copy event handler
        function copyIpToClipboard() {
            const ipText = document.getElementById('userIp').innerText;
            if(ipText && ipText !== "Loading..." && ipText !== "DISCONNECTED") {
                navigator.clipboard.writeText(ipText);
                
                const btn = document.getElementById('copyBtn');
                btn.innerText = "COPIED!";
                btn.style.borderColor = "var(--terminal-green)";
                
                setTimeout(() => {
                    btn.innerText = "COPY";
                }, 2000);
            }
        }

        // Remote lookups
        async function runConsoleTrace() {
            const query = document.getElementById('traceInput').value.trim();
            const consoleLog = document.getElementById('consoleLog');
            consoleLog.style.display = "block";
            consoleLog.innerText = ">> Initializing remote target handshake...";

            if(!query) {
                consoleLog.innerText = ">> ERR: Stream arguments missing.";
                return;
            }

            const checkIpStr = /^[0-9.]+$|^[0-9a-fA-F:]+$/.test(query);

            if (checkIpStr) {
                try {
                    const res = await fetch(`http://ip-api.com/json/${query}`);
                    const data = await res.json();
                    if(data.status === "success") {
                        consoleLog.innerText = `>> DATA DETECTED\nIP:  ${data.query}\nISP: ${data.isp}\nLOC: ${data.city}, ${data.country}`;
                    } else {
                        consoleLog.innerText = `>> Trace failed: ${data.message}`;
                    }
                } catch(e) { consoleLog.innerText = ">> Host handshake timeout."; }
            } else {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if(data && data.length > 0) {
                        consoleLog.innerText = `>> SPATIAL HASH FOUND\nADDR: ${data[0].display_name}\nLAT:  ${data[0].lat}\nLON:  ${data[0].lon}`;
                    } else {
                        consoleLog.innerText = ">> Zero directory records match query string.";
                    }
                } catch(e) { consoleLog.innerText = ">> Internal geolocation trace error."; }
            }
        }

        window.onload = runAutoNodeProfiling;
    </script>
</body>
</html>
